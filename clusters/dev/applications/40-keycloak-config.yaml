apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 40-keycloak-config
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "40"
spec:
  project: default
  source:
    repoURL: https://github.com/kamori/spiffe-rhbk.git
    targetRevision: main
    path: keycloak-config/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: rhbk-demo
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=false
